spring.application.name=leadprosvet
server.port=8082

# Public URL where Bitrix24 opens this server-side local application.
app.base-url=${APP_BASE_URL:https://leadprosvet.abs7.ru}
app.name=ЛидПросвет
app.version=0.0.1-SNAPSHOT

# Temporary in-memory DB so the first skeleton starts locally and in Docker without external PostgreSQL.
# When we start storing OAuth tokens/settings permanently, switch these to PostgreSQL env vars.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:leadprosvet;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

spring.mvc.hiddenmethod.filter.enabled=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

logging.level.ru.abs7.leadprosvet=INFO
logging.level.org.springframework.web=INFO
