spring.application.name=leadprosvet
server.port=8082

# Public URL where Bitrix24 opens this server-side local application.
app.base-url=${APP_BASE_URL:https://leadprosvet.abs7.ru}
app.name=ЛидПросвет
app.version=0.0.1-SNAPSHOT

# File-based H2 storage. In Docker APP_DATA_DIR=/data must be mounted to ./data on VPS.
# This keeps Bitrix OAuth/config/prompt/LLM settings after container rebuilds.
app.data-dir=${APP_DATA_DIR:./data}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:${app.data-dir}/leadprosvet;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;AUTO_SERVER=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

spring.mvc.hiddenmethod.filter.enabled=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

logging.level.ru.abs7.leadprosvet=INFO
logging.level.org.springframework.web=INFO
